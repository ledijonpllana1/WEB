<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stylee.css">
</head>
<body>
    <form onsubmit="return validation();" method="POST">
            <div class="name-container">
                <label for="name" id="name_label">Name: </label>
                <input type="text" name="name" id="name">
                <span id="name_error">Please enter a valid name</span>
            </div>
            <br>

            <div class="age-container">
                <label for="name" id="age_label">Age</label>
                <input type="text" name="age" id="age">
                <span id="age_error">Please enter a valid age</span>
            </div>
            <br>
            <div class="city-container">
                <label for="city" id="city|_label">City:</label>
                <select name="city" id="city">
                    <option value="" selected></option>
                    <option value="Prishtin">Prishtin</option>
                    <option value="Prishtin">Gjilan</option>
                    <option value="Prishtin">Gjakov</option>
                    <option value="Prishtin">Ferizaj</option>



                </select>

                <span id="city_error">Please select a city</span>
            </div>
            <button type="submit" name="submit">Send</button>
    </form>

<script src="main.js"></script>



</body>
</html>
